    <!-- ----------------------EJERCICIO 1---------------------- -->
    <div

    >
      <h1 id="contador">10</h1>
      <button id="btnIniciar">Iniciar Cuenta Regresiva</button>
    </div>

    <div

      style="width: 200px"
    >
      <div
        id="semaforo"

          height: 100px;
          background-color: gray;
          border-radius: 50%;
          margin: auto;
          padding: 2px;
        "
      ></div>
      <button id="btnSemaforo" class="m-2">Encender Semáforo</button>
    </div>

      <div

        class="alert alert-success mt-3 d-none"
        role="alert"
        style="width: 250px"
